root = "."
tmp_dir = "tmp"

[build]
bin = "./tmp/kin-api"
cmd = "go build -o ./tmp/kin-api ./cmd/api"
delay = 500
exclude_dir = ["tmp"]
exclude_regex = ["_test\\.go"]
include_ext = ["go", "tpl", "tmpl", "html"]
poll = true
poll_interval = 500

[log]
time = true

[misc]
clean_on_exit = true